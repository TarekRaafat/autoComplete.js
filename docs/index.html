    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "How do I get the selected value in autoComplete.js?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Listen for the selection event on the input element. For string data use event.detail.selection.value. For object data with keys use event.detail.selection.value[event.detail.selection.key]."
                }
            },
            {
                "@type": "Question",
                "name": "How do I show all results when the input is focused?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Set threshold to 0 and call autoCompleteJS.start() in a focus event handler via the events.input.focus configuration."
                }
            },
            {
                "@type": "Question",
                "name": "How do I use multiple autocomplete instances on the same page?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Create separate autoComplete instances with unique selector values. Class selectors only match the first element, so always use unique ID selectors with separate instances."
                }
            },
            {
                "@type": "Question",
                "name": "How do I fetch data from an API with autoComplete.js?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Use an async function as data.src. The function receives the current query as a parameter. Set debounce to 300 to reduce API calls. Set data.cache to true to fetch once and search locally, or false to fetch on every keystroke."
                }
            },
            {
                "@type": "Question",
                "name": "How do I force the user to select from the results list?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Validate the input value on the blur event and clear it if it does not match any entry in the data store using autoCompleteJS.data.store.includes()."
                }
            },
            {
                "@type": "Question",
                "name": "How do I show a No Results message?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Enable resultsList.noResults to true and use the resultsList.element callback to prepend a message element when data.results.length is 0."
                }
            },
            {
                "@type": "Question",
                "name": "How do I update the data source at runtime?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "With data.cache set to false (default), the data.src function is called on every search, so it naturally picks up new data. If you use data.cache set to true, you can update the cached store directly via autoCompleteJS.data.store = newDataArray."
                }
            },
            {
                "@type": "Question",
                "name": "How do I disable the wrapper element in autoComplete.js?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Set wrapper to false in the configuration. The ARIA attributes will be applied directly to the input element instead of a wrapper div."
                }
            },
            {
                "@type": "Question",
                "name": "How do I search across multiple object keys at the same time?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Pass multiple keys in the data.keys array. Each record will be searched against all specified keys. For example: keys: ['name', 'category']."
                }
            },
            {
                "@type": "Question",
                "name": "How do I customize the appearance of each result item?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Use the resultItem.element callback to modify each item before it is rendered. The callback receives the item element and data object containing match, value, and key properties."
                }
            },
            {
                "@type": "Question",
                "name": "How do I use autoComplete.js with a form submit?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "By default, pressing Enter while a result is highlighted selects the result and prevents form submission. Set submit to true to allow the Enter key to submit the form normally."
                }
            }
        ]
    }
